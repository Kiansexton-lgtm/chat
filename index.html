<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="server-bar" id="serverBar">
    <div class="server-icon home">H</div>
    <div class="server-separator"></div>
    <div id="serverList"></div>
    <div class="server-icon add" id="addServerBtn">+</div>
  </div>

  <div class="app">

    <aside class="sidebar">
      <div class="user-section">
        <div class="avatar">Y</div>
        <div class="status-dot"></div>
      </div>

      <div class="section-title">Channels</div>
      <ul class="channel-list" id="channelList"></ul>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <div>
          <div class="chat-title" id="currentChannelName">Select a channel</div>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <footer class="chat-input">
        <input id="messageInput" type="text" placeholder="Message…" />
        <button class="send-btn" id="sendBtn">Send</button>
      </footer>
    </main>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="script.js"></script>
</body>
</html>
