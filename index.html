<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dark Chat Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">chat<span>room</span></div>
      <div class="user-section">
        <div class="avatar">U</div>
        <div class="user-info">
          <div class="user-name">You</div>
          <div class="user-status">online</div>
        </div>
      </div>

      <div class="section-title">Channels</div>
      <ul class="channel-list">
        <li class="channel active"># general</li>
        <li class="channel"># dev-talk</li>
        <li class="channel"># random</li>
      </ul>

      <div class="section-title">Direct messages</div>
      <ul class="dm-list">
        <li class="dm">
          <span class="status-dot online"></span>
          Alex
        </li>
        <li class="dm">
          <span class="status-dot idle"></span>
          Sam
        </li>
      </ul>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <div>
          <div class="chat-title"># general</div>
          <div class="chat-subtitle">Dark chat room hosted on GitHub</div>
        </div>
        <div class="chat-actions">
          <button class="icon-btn">🔍</button>
          <button class="icon-btn">⚙️</button>
        </div>
      </header>

      <section class="messages">
        <div class="message">
          <div class="avatar small">A</div>
          <div class="message-body">
            <div class="message-meta">
              <span class="author">Alex</span>
              <span class="time">10:21</span>
            </div>
            <div class="message-text">
              Welcome to the new dark chat UI 👋
            </div>
          </div>
        </div>

        <div class="message self">
          <div class="avatar small">Y</div>
          <div class="message-body">
            <div class="message-meta">
              <span class="author">You</span>
              <span class="time">10:22</span>
            </div>
            <div class="message-text">
              Looks clean. Let’s ship it to GitHub Pages.
            </div>
          </div>
        </div>
      </section>

      <footer class="chat-input">
  <button class="icon-btn attach">+</button>
  <input type="text" placeholder="Message #general" />
  <button class="send-btn">Send</button>
</footer>

      </footer>
    </main>
  </div>
</body>
</html>
