<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="logo">ChatRoom</div>

      <div class="section-title">Channels</div>
      <ul class="channel-list">
        <li class="channel active"># general</li>
        <li class="channel"># dev-talk</li>
        <li class="channel"># random</li>
      </ul>

      <div class="section-title">Direct Messages</div>
      <ul class="dm-list">
        <li class="dm">Alex</li>
        <li class="dm">Sam</li>
      </ul>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <div>
          <div class="chat-title"># general</div>
          <div class="chat-subtitle">Welcome to the chat</div>
        </div>
      </header>

      <section class="messages">
        <div class="message">
          <div class="avatar">A</div>
          <div class="message-body">
            <div class="message-meta">
              <span class="author">Alex</span>
              <span class="time">10:21</span>
            </div>
            <div class="message-text">Welcome to the dark chat UI.</div>
          </div>
        </div>

        <div class="message self">
          <div class="avatar">Y</div>
          <div class="message-body">
            <div class="message-meta">
              <span class="author">You</span>
              <span class="time">10:22</span>
            </div>
            <div class="message-text">Looks clean.</div>
          </div>
        </div>
      </section>

      <footer class="chat-input">
        <button class="icon-btn">+</button>
        <input type="text" placeholder="Message #general" />
        <button class="send-btn">Send</button>
      </footer>
    </main>

  </div>
</body>
</html>
