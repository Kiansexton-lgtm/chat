<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- LOGIN / REGISTER OVERLAY -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <h1>Dark Chat</h1>

      <div class="auth-tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Register</button>
      </div>

      <div class="auth-form">
        <input id="authUsername" placeholder="Username" />
        <input id="authPassword" type="password" placeholder="Password" />
        <button id="authSubmit">Continue</button>
      </div>
    </div>
  </div>

  <!-- SERVER BAR -->
  <div class="server-bar" id="serverBar">
    <div class="server-icon home">H</div>
    <div class="server-separator"></div>
    <div id="serverList"></div>
    <div class="server-icon add" id="addServerBtn">+</div>
  </div>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="user-section">
        <div class="avatar">U</div>
        <div class="status-dot"></div>
      </div>

      <div class="section-title">Channels</div>
      <ul class="channel-list" id="channelList"></ul>

      <button class="create-channel-btn" id="createChannelBtn">+ Create Channel</button>
    </aside>

    <!-- CHAT -->
    <main class="chat">
      <header class="chat-header">
        <div>
          <div class="chat-title" id="currentChannelName">Select a channel</div>
        </div>
        <button id="serverSettingsBtn" class="icon-btn">⚙</button>
      </header>

      <section class="messages" id="messages"></section>

      <footer class="chat-input">
        <input id="messageInput" type="text" placeholder="Message…" />
        <button class="send-btn" id="sendBtn">Send</button>
      </footer>
    </main>

  </div>

  <!-- SERVER SETTINGS MODAL -->
  <div class="modal-overlay" id="serverModal">
    <div class="modal">
      <h2>Server Settings</h2>
      <input id="serverNameInput" placeholder="Server Name" />
      <input id="serverColorInput" type="color" />
      <button id="saveServerSettings">Save</button>
      <button id="closeServerModal">Close</button>
    </div>
  </div>

  <!-- CHANNEL CREATION MODAL -->
  <div class="modal-overlay" id="channelModal">
    <div class="modal">
      <h2>Create Channel</h2>
      <input id="channelNameInput" placeholder="Channel Name" />
      <button id="createChannelConfirm">Create</button>
      <button id="closeChannelModal">Close</button>
    </div>
  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="script.js"></script>
</body>
</html>
