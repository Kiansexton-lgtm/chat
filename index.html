<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nightcord Minimal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css" />

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script defer src="app.js"></script>
</head>

<body>
  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <h1>Nightcord</h1>

      <div class="auth-tabs">
        <button id="login-tab" class="active">Login</button>
        <button id="register-tab">Register</button>
      </div>

      <form id="login-form" class="auth-form">
        <input id="login-email" type="email" placeholder="Email" required />
        <input id="login-password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p id="login-error" class="error"></p>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input id="reg-username" type="text" placeholder="Username" required />
        <input id="reg-email" type="email" placeholder="Email" required />
        <input id="reg-password" type="password" placeholder="Password" required />
        <button type="submit">Create Account</button>
        <p id="register-error" class="error"></p>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app hidden">

    <!-- LEFT: CHANNELS -->
    <aside class="sidebar-left">
      <div class="section-title">Channels</div>
      <div id="rooms-list" class="list"></div>
      <button id="create-room-btn" class="create-btn">+ New Channel</button>

      <div class="section-title">Direct Messages</div>
      <div id="dms-list" class="list"></div>
    </aside>

    <!-- CENTER: CHAT -->
    <main class="chat">
      <header class="chat-header">
        <h2 id="room-title">Select a channel</h2>
        <button id="logout-btn" class="logout-btn">Logout</button>
      </header>

      <div id="messages" class="messages"></div>

      <form id="message-form" class="message-bar">
        <input id="message-input" type="text" placeholder="Message…" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>

    <!-- RIGHT: FRIENDS -->
    <aside class="sidebar-right">
      <div class="section-title">Friends</div>
      <div id="friends-list" class="list"></div>

      <div class="section-title">Requests</div>
      <div id="requests-list" class="list"></div>

      <div class="section-title">Add Friend</div>
      <form id="add-friend-form" class="add-friend">
        <input id="add-friend-input" type="text" placeholder="username#tag" />
        <button>Add</button>
      </form>
      <p id="add-friend-status" class="status"></p>
    </aside>

  </div>
</body>
</html>
