<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark DM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- AUTH OVERLAY -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <h1>Dark DM</h1>

      <div class="auth-tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Register</button>
      </div>

      <div class="auth-form">
        <input id="authUsername" placeholder="Username" />
        <input id="authPassword" type="password" placeholder="Password" />
        <button id="authSubmit">Continue</button>
      </div>
    </div>
  </div>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="user-section">
        <div class="avatar" id="selfAvatar">U</div>
        <div class="status-dot"></div>
        <div class="self-username" id="selfUsername">@user</div>
      </div>

      <div class="section-title">Add Friend</div>
      <div class="add-friend">
        <input id="addFriendInput" placeholder="Username" />
        <button class="icon-btn" id="addFriendBtn">Add</button>
      </div>

      <div class="section-title">Friend Requests</div>
      <ul class="request-list" id="requestList"></ul>

      <div class="section-title">Friends</div>
      <ul class="friend-list" id="friendList"></ul>
    </aside>

    <!-- CHAT -->
    <main class="chat">
      <header class="chat-header">
        <div class="chat-header-info">
          <div class="chat-title" id="chatTitle">Select a friend</div>
          <div class="chat-subtitle" id="chatSubtitle"></div>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <footer class="chat-input">
        <input id="messageInput" type="text" placeholder="Message…" />
        <button class="send-btn" id="sendBtn">Send</button>
      </footer>
    </main>

  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="script.js"></script>
</body>
</html>
